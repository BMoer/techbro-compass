<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcast Political Compass — DACH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c23616;
    --grid: rgba(0,0,0,0.08);
    --dim: #aaa;
    --paper: #f5f0eb;
    --ink: #1a1a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    font-size: 13px;
    display: flex;
  }

  /* ── 3-column layout ── */
  .panel-left, .panel-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 1.5rem;
    min-width: 180px;
    max-width: 280px;
    overflow-y: auto;
  }

  .compass-center {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.8rem 0;
  }
  .compass-svg {
    height: calc(100vh - 1.6rem);
    aspect-ratio: 1;
    cursor: crosshair;
  }

  /* ── Left panel ── */
  .site-title {
    font-family: 'Instrument Serif', serif;
    font-size: 1.3rem;
    font-weight: 400;
    line-height: 1.2;
    color: var(--dim);
    margin-bottom: 0.3rem;
  }
  .site-title em { color: var(--ink); font-style: italic; }
  .site-sub {
    font-size: 0.55rem;
    color: var(--dim);
    line-height: 1.5;
    margin-bottom: 1.5rem;
  }
  .site-links {
    font-size: 0.6rem;
    color: var(--dim);
    line-height: 2;
    margin-top: auto;
    padding-top: 1rem;
    border-top: 1px solid var(--grid);
  }
  .site-links a { color: var(--dim); text-decoration: none; }
  .site-links a:hover { color: var(--red); }

  /* ── Right panel: legend + time slider ── */
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.3rem 0.35rem;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.1s;
  }
  .legend-item:hover { background: rgba(0,0,0,0.04); }
  .legend-item.active { background: rgba(0,0,0,0.07); }
  .legend-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-name { font-size: 0.6rem; flex: 1; }
  .legend-count { font-size: 0.55rem; color: var(--dim); }
  .legend-reset {
    font-size: 0.55rem;
    color: var(--red);
    cursor: pointer;
    padding: 0.2rem 0.35rem;
  }
  .legend-reset:hover { text-decoration: underline; }

  /* ── Time range slider ── */
  .time-control {
    margin-top: 1.5rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--grid);
  }
  .time-label {
    font-size: 0.55rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }
  .time-range-wrap {
    position: relative;
    height: 24px;
    margin: 0.3rem 0;
  }
  .time-range-wrap input[type=range] {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 24px;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    pointer-events: none;
    margin: 0;
  }
  .time-range-wrap input[type=range]::-webkit-slider-runnable-track {
    height: 3px;
    background: transparent;
  }
  .time-range-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--paper);
    cursor: pointer;
    pointer-events: all;
    margin-top: -6px;
  }
  .time-range-wrap input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--paper);
    cursor: pointer;
    pointer-events: all;
  }
  .time-range-track {
    position: absolute;
    top: 10px; left: 0; right: 0;
    height: 3px;
    background: #ddd;
    border-radius: 2px;
    pointer-events: none;
  }
  .time-range-fill {
    position: absolute;
    top: 10px;
    height: 3px;
    background: var(--ink);
    border-radius: 2px;
    pointer-events: none;
  }
  .time-display {
    font-size: 0.65rem;
    color: var(--ink);
    text-align: center;
    margin-top: 0.2rem;
    font-weight: 500;
  }

  .panel-meta {
    font-size: 0.55rem;
    color: var(--dim);
    margin-top: 1rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--grid);
    line-height: 1.7;
  }
  .panel-meta a { color: var(--dim); text-decoration: none; }
  .panel-meta a:hover { color: var(--red); }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed;
    background: var(--ink);
    color: var(--paper);
    padding: 0.45rem 0.6rem;
    font-size: 0.6rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 100;
    max-width: 300px;
    line-height: 1.4;
    border-radius: 3px;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip .tp { font-weight: 500; margin-bottom: 1px; }
  .tooltip .tt { color: #aaa; font-size: 0.55rem; }
  .tooltip .tq { font-style: italic; margin-top: 3px; color: #ddd; font-size: 0.55rem; border-left: 2px solid var(--red); padding-left: 4px; }
  .tooltip .ts { color: #888; font-size: 0.5rem; margin-top: 1px; }
  .tooltip .tv { color: #999; font-size: 0.5rem; margin-top: 2px; }

  @media (max-width: 900px) {
    body { flex-direction: column; overflow-y: auto; }
    .panel-left, .panel-right { max-width: 100%; flex-direction: row; flex-wrap: wrap; gap: 0.5rem; padding: 0.8rem; }
    .compass-center { width: 100%; }
    .compass-svg { height: auto; width: 100%; max-height: 80vh; }
    .time-control { margin-top: 0; border: none; padding: 0; }
  }
</style>
</head>
<body>

<div class="panel-left" id="panel-left">
  <div class="site-title"><em>Political Compass</em><br>DACH Tech-Podcasts</div>
  <div class="site-sub">Politische Verortung deutschsprachiger Tech-Podcasts via LLM-Codierung</div>
  <div class="site-links">
    <a href="methodik.html">Methodik</a><br>
    <a href="https://github.com/BMoer/techbro-compass">GitHub</a><br>
    <a href="https://moerzinger.eu">Atelier M&ouml;rzinger</a>
  </div>
</div>

<div class="compass-center">
  <svg class="compass-svg" id="compass-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div class="panel-right" id="panel-right">
  <div id="legend"></div>
  <div class="time-control" id="time-control">
    <div class="time-label">Zeitraum</div>
    <div class="time-range-wrap">
      <div class="time-range-track"></div>
      <div class="time-range-fill" id="range-fill"></div>
      <input type="range" id="range-min" min="0" max="100" value="0">
      <input type="range" id="range-max" min="0" max="100" value="100">
    </div>
    <div class="time-display" id="time-display"></div>
  </div>
  <div class="panel-meta" id="panel-meta"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const COLORS = {
  'Future Weekly': '#c23616',
  'Doppelg\u00E4nger Tech Talk': '#2d5aa0',
  'OMR Podcast': '#1e7a3f',
  'Lobo \u2013 Der Debatten-Podcast': '#8e44ad',
  't3n Podcast': '#d35400',
  'Bits und so': '#16a085',
  'Tech Briefing': '#7f8c8d',
  "c't uplink": '#2c3e50',
  'Tech, KI & Schmetterlinge': '#e74c3c',
  'Digitec Tech-Telmechtel': '#f39c12',
};

let allEpisodes = [];
let episodes = [];  // filtered by time
let selectedPodcast = null;
let dataMinDate, dataMaxDate;
const tooltip = document.getElementById('tooltip');

// ── Tooltip ──

function showTip(evt, html) {
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  const r = tooltip.getBoundingClientRect();
  let x = evt.clientX + 12, y = evt.clientY - 10;
  if (x + r.width > window.innerWidth - 8) x = evt.clientX - r.width - 8;
  if (y + r.height > window.innerHeight - 8) y = evt.clientY - r.height - 8;
  if (y < 4) y = 4;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function epTip(ep, extra) {
  const sp = ep.sample_speaker === 'guest' ? 'Gast' : 'Host';
  let h = '<div class="tp">' + ep.podcast + '</div>';
  h += '<div class="tt">' + (ep.title || '').substring(0, 55) + (ep.date ? ' \u00B7 ' + ep.date : '') + '</div>';
  if (ep.sample_statement) {
    h += '<div class="tq">\u201E' + ep.sample_statement.substring(0, 95) + (ep.sample_statement.length > 95 ? '\u2026' : '') + '\u201C</div>';
    h += '<div class="ts">\u2014 ' + sp + '</div>';
  }
  if (extra) h += '<div class="tv">' + extra + '</div>';
  return h;
}

function hideTip() { tooltip.classList.remove('visible'); }

// ── Time filter ──

function initTimeSlider() {
  const dates = allEpisodes.filter(e => e.date && e.date.length === 10).map(e => new Date(e.date).getTime());
  if (dates.length === 0) return;
  dataMinDate = Math.min(...dates);
  dataMaxDate = Math.max(...dates);

  const minY = new Date(dataMinDate).getFullYear();
  const maxY = new Date(dataMaxDate).getFullYear();

  const rMin = document.getElementById('range-min');
  const rMax = document.getElementById('range-max');
  // Use quarters for finer control
  const totalQ = (maxY - minY + 1) * 4;
  rMin.min = 0; rMin.max = totalQ; rMin.value = 0;
  rMax.min = 0; rMax.max = totalQ; rMax.value = totalQ;

  function qToDate(q) {
    const yr = minY + Math.floor(q / 4);
    const mo = (q % 4) * 3;
    return new Date(yr, mo, 1);
  }

  function formatQ(q) {
    const d = qToDate(q);
    const qn = Math.floor(d.getMonth() / 3) + 1;
    return 'Q' + qn + ' ' + d.getFullYear();
  }

  function update() {
    let lo = parseInt(rMin.value);
    let hi = parseInt(rMax.value);
    if (lo > hi - 1) { lo = hi - 1; rMin.value = lo; }
    if (hi < lo + 1) { hi = lo + 1; rMax.value = hi; }

    const loDate = qToDate(lo);
    const hiDate = qToDate(hi);

    // Update fill bar
    const pct1 = (lo / totalQ) * 100;
    const pct2 = (hi / totalQ) * 100;
    document.getElementById('range-fill').style.left = pct1 + '%';
    document.getElementById('range-fill').style.width = (pct2 - pct1) + '%';

    document.getElementById('time-display').textContent = formatQ(lo) + ' \u2013 ' + formatQ(hi);

    // Filter episodes
    episodes = allEpisodes.filter(ep => {
      if (!ep.date || ep.date.length < 10) return true;
      const d = new Date(ep.date);
      return d >= loDate && d <= hiDate;
    });

    renderCompass();
  }

  rMin.addEventListener('input', update);
  rMax.addEventListener('input', update);
  update();
}

// ── Compass ──

function selectPodcast(pod) {
  selectedPodcast = selectedPodcast === pod ? null : pod;
  renderCompass();
}

function renderCompass() {
  const svg = document.getElementById('compass-svg');
  svg.innerHTML = '';

  const byPod = {};
  episodes.forEach(ep => {
    if (!byPod[ep.podcast]) byPod[ep.podcast] = { eps: [], country: ep.country || '?' };
    byPod[ep.podcast].eps.push(ep);
  });

  const zoomed = selectedPodcast && byPod[selectedPodcast];

  // Data range
  let dxMin, dxMax, dyMin, dyMax;
  if (zoomed) {
    const pts = zoomed.eps;
    const exs = pts.map(e => e.economic_score);
    const eys = pts.map(e => e.social_score);
    const pad = 1.5;
    dxMin = Math.min(...exs) - pad; dxMax = Math.max(...exs) + pad;
    dyMin = Math.min(...eys) - pad; dyMax = Math.max(...eys) + pad;
    if (dxMax - dxMin < 4) { const m = (dxMin + dxMax) / 2; dxMin = m - 2; dxMax = m + 2; }
    if (dyMax - dyMin < 4) { const m = (dyMin + dyMax) / 2; dyMin = m - 2; dyMax = m + 2; }
  } else {
    dxMin = -10; dxMax = 10; dyMin = -10; dyMax = 10;
  }

  const W = 600, H = 600;
  const P = { t: 32, r: 32, b: 32, l: 32 };
  const cw = W - P.l - P.r, ch = H - P.t - P.b;
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

  function sx(v) { return P.l + ((v - dxMin) / (dxMax - dxMin)) * cw; }
  function sy(v) { return P.t + ((dyMax - v) / (dyMax - dyMin)) * ch; }

  const NS = 'http://www.w3.org/2000/svg';
  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, '' + v);
    return e;
  }

  // Clip
  const clip = el('clipPath', { id: 'ca' });
  clip.appendChild(el('rect', { x: P.l, y: P.t, width: cw, height: ch }));
  svg.appendChild(clip);

  // Quadrant fills
  const zx = Math.max(P.l, Math.min(W - P.r, sx(0)));
  const zy = Math.max(P.t, Math.min(H - P.b, sy(0)));
  const qg = el('g', { 'clip-path': 'url(#ca)' });
  qg.appendChild(el('rect', { x: P.l, y: P.t, width: zx - P.l, height: zy - P.t, fill: 'rgba(194,54,22,0.03)' }));
  qg.appendChild(el('rect', { x: zx, y: P.t, width: W - P.r - zx, height: zy - P.t, fill: 'rgba(30,122,63,0.03)' }));
  qg.appendChild(el('rect', { x: P.l, y: zy, width: zx - P.l, height: H - P.b - zy, fill: 'rgba(45,90,160,0.03)' }));
  qg.appendChild(el('rect', { x: zx, y: zy, width: W - P.r - zx, height: H - P.b - zy, fill: 'rgba(212,160,23,0.03)' }));
  svg.appendChild(qg);

  // Border
  svg.appendChild(el('rect', { x: P.l, y: P.t, width: cw, height: ch, fill: 'none', stroke: '#e0e0e0', 'stroke-width': '0.8' }));

  // Grid
  function step(range) { return range <= 5 ? 1 : range <= 12 ? 2 : 5; }
  const xs = step(dxMax - dxMin), ys = step(dyMax - dyMin);

  for (let v = Math.ceil(dxMin / xs) * xs; v <= dxMax; v += xs) {
    const x = sx(v);
    if (x <= P.l + 1 || x >= W - P.r - 1) continue;
    const z = Math.abs(v) < 0.01;
    svg.appendChild(el('line', { x1: x, y1: P.t, x2: x, y2: H - P.b, stroke: z ? '#bbb' : '#eee', 'stroke-width': z ? '1' : '0.5', 'stroke-dasharray': z ? '4,3' : 'none' }));
    const lb = el('text', { x: x, y: H - P.b + 13, 'text-anchor': 'middle', 'font-family': 'DM Mono,monospace', 'font-size': '7', fill: z ? '#999' : '#ccc' });
    lb.textContent = (v > 0 ? '+' : '') + v;
    svg.appendChild(lb);
  }
  for (let v = Math.ceil(dyMin / ys) * ys; v <= dyMax; v += ys) {
    const y = sy(v);
    if (y <= P.t + 1 || y >= H - P.b - 1) continue;
    const z = Math.abs(v) < 0.01;
    svg.appendChild(el('line', { x1: P.l, y1: y, x2: W - P.r, y2: y, stroke: z ? '#bbb' : '#eee', 'stroke-width': z ? '1' : '0.5', 'stroke-dasharray': z ? '4,3' : 'none' }));
    const lb = el('text', { x: P.l - 5, y: y + 3, 'text-anchor': 'end', 'font-family': 'DM Mono,monospace', 'font-size': '7', fill: z ? '#999' : '#ccc' });
    lb.textContent = (v > 0 ? '+' : '') + v;
    svg.appendChild(lb);
  }

  // Axis labels
  const af = { 'font-family': 'DM Mono,monospace', 'font-size': '6.5', fill: '#c0c0c0', 'letter-spacing': '1.5' };
  const mkLabel = (x, y, txt, rot) => {
    const t = el('text', { x, y, 'text-anchor': 'middle', ...af, ...(rot ? { transform: 'rotate(' + rot + ',' + x + ',' + y + ')' } : {}) });
    t.textContent = txt;
    svg.appendChild(t);
  };
  mkLabel(W / 2, P.t - 8, 'LIBERT\u00C4R');
  mkLabel(W / 2, H - P.b + 25, 'AUTORIT\u00C4R');
  mkLabel(P.l - 16, H / 2, 'LINKS', '-90');
  mkLabel(W - P.r + 16, H / 2, 'RECHTS', '90');

  // Data group
  const dg = el('g', { 'clip-path': 'url(#ca)' });
  svg.appendChild(dg);

  // Episode dots
  const dr = zoomed ? 4.5 : 3;
  episodes.forEach(ep => {
    const mine = !selectedPodcast || ep.podcast === selectedPodcast;
    const c = el('circle', {
      cx: sx(ep.economic_score), cy: sy(ep.social_score), r: dr,
      fill: COLORS[ep.podcast] || '#999',
      opacity: mine ? (zoomed ? '0.8' : '0.28') : '0.04',
      class: 'ep-dot', 'data-podcast': ep.podcast,
    });
    if (mine) {
      c.style.cursor = 'pointer';
      c.addEventListener('mouseenter', e => showTip(e, epTip(ep, 'Econ ' + ep.economic_score.toFixed(1) + ' | Soc ' + ep.social_score.toFixed(1))));
      c.addEventListener('mousemove', e => { tooltip.style.left = (e.clientX + 12) + 'px'; tooltip.style.top = (e.clientY - 10) + 'px'; });
      c.addEventListener('mouseleave', hideTip);
    }
    dg.appendChild(c);
  });

  // Average dots (overview only)
  if (!zoomed) {
    Object.entries(byPod).forEach(([pod, data]) => {
      const ae = data.eps.reduce((a, e) => a + e.economic_score, 0) / data.eps.length;
      const as_ = data.eps.reduce((a, e) => a + e.social_score, 0) / data.eps.length;
      const color = COLORS[pod] || '#999';
      const c = el('circle', {
        cx: sx(ae), cy: sy(as_), r: '7', fill: color,
        stroke: 'white', 'stroke-width': '1.8',
        class: 'avg-dot', 'data-podcast': pod,
      });
      c.style.cursor = 'pointer';
      c.addEventListener('mouseenter', e => showTip(e,
        '<div class="tp">' + pod + '</div><div class="tv">\u00D8 ' + data.eps.length + ' Ep. \u00B7 Econ ' + ae.toFixed(1) + ' | Soc ' + as_.toFixed(1) + '</div>'));
      c.addEventListener('mouseleave', hideTip);
      c.addEventListener('click', () => selectPodcast(pod));
      dg.appendChild(c);

      const t = el('text', {
        x: sx(ae) + 11, y: sy(as_) + 3,
        'font-family': 'DM Mono,monospace', 'font-size': '7.5',
        fill: color, 'font-weight': '500', 'pointer-events': 'none',
      });
      t.textContent = pod.length > 18 ? pod.substring(0, 16) + '\u2026' : pod;
      dg.appendChild(t);
    });
  }

  renderLegend(byPod);
}

function renderLegend(byPod) {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';

  // Use allEpisodes for stable legend (show all podcasts even when filtered)
  const allPods = {};
  allEpisodes.forEach(ep => {
    if (!allPods[ep.podcast]) allPods[ep.podcast] = 0;
    allPods[ep.podcast]++;
  });

  Object.keys(allPods).forEach(pod => {
    const color = COLORS[pod] || '#999';
    const current = byPod[pod];
    const n = current ? current.eps.length : 0;

    const item = document.createElement('div');
    item.className = 'legend-item' + (selectedPodcast === pod ? ' active' : '');
    item.style.opacity = n === 0 && !selectedPodcast ? '0.35' : '1';
    item.innerHTML =
      '<span class="legend-dot" style="background:' + color + '"></span>' +
      '<span class="legend-name">' + pod + '</span>' +
      '<span class="legend-count">' + n + '</span>';

    item.addEventListener('click', () => selectPodcast(pod));

    item.addEventListener('mouseenter', () => {
      if (selectedPodcast) return;
      document.querySelectorAll('.ep-dot').forEach(d =>
        d.setAttribute('opacity', d.getAttribute('data-podcast') === pod ? '0.65' : '0.04'));
      document.querySelectorAll('.avg-dot').forEach(d =>
        d.setAttribute('opacity', d.getAttribute('data-podcast') === pod ? '1' : '0.1'));
    });
    item.addEventListener('mouseleave', () => {
      if (selectedPodcast) return;
      document.querySelectorAll('.ep-dot').forEach(d => d.setAttribute('opacity', '0.28'));
      document.querySelectorAll('.avg-dot').forEach(d => d.setAttribute('opacity', '1'));
    });
    legend.appendChild(item);
  });

  if (selectedPodcast) {
    const r = document.createElement('div');
    r.className = 'legend-reset';
    r.textContent = '\u2190 Alle';
    r.addEventListener('click', () => { selectedPodcast = null; renderCompass(); });
    legend.appendChild(r);
  }

  document.getElementById('panel-meta').innerHTML =
    episodes.length + '/' + allEpisodes.length + ' Episoden<br>Claude Haiku 4.5 \u00B7 <a href="methodik.html">Methodik \u2192</a>';
}

// ── Load ──

async function loadData() {
  try {
    const r = await fetch('data.json');
    if (r.ok) {
      const d = await r.json();
      if (d.episodes) allEpisodes = d.episodes.filter(e => e.economic_score != null);
    }
  } catch (e) { console.log('data.json not found'); }

  if (allEpisodes.length > 0) {
    episodes = [...allEpisodes];
    initTimeSlider();
  }
}

document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
